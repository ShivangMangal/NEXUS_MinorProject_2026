name: Build and deploy JAR app to Azure Web App - Nexus-Sutrava

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'maven'

      - name: Build with Maven
        working-directory: ${{ github.workspace }}/Phase-2/BackEnd   # ✅ Correct path
        run: mvn clean package -DskipTests

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: ${{ github.workspace }}/Phase-2/BackEnd/target/BackEnd-0.0.1-SNAPSHOT.jar  # ✅ Correct path

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
          path: ./app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_87FCB3945A5C4F2298E7F599C2A47213 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BE464CFDC1D84DC1984EE65C87A91160 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_05CB964A82AD4F8396C4AC2BE9B3D2F3 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: Nexus-Sutrava
          slot-name: Production
          package: './app/BackEnd-0.0.1-SNAPSHOT.jar'
